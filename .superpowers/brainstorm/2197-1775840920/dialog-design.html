<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>升级确认弹窗设计</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* 弹窗容器 */
    .dialog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    
    .dialog-box {
      background: #fff;
      width: 420px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 8px 24px rgba(0, 0, 0, 0.1);
      animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    /* 头部 */
    .dialog-header {
      background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
      padding: 24px 24px 20px;
      position: relative;
    }
    
    .dialog-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 24px;
      right: 24px;
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
    }
    
    .dialog-icon {
      width: 48px;
      height: 48px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    
    .dialog-icon svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }
    
    .dialog-title {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    /* 内容区 */
    .dialog-body {
      padding: 24px;
    }
    
    .dialog-desc {
      font-size: 14px;
      color: #595959;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    
    /* 数量展示卡片 */
    .count-card {
      background: linear-gradient(135deg, #e6f7ff 0%, #bae7ff 100%);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #91d5ff;
    }
    
    .count-number {
      font-size: 32px;
      font-weight: 700;
      color: #1890ff;
      font-family: 'SF Pro Display', 'Segoe UI', sans-serif;
      letter-spacing: -1px;
    }
    
    .count-label {
      font-size: 14px;
      color: #1890ff;
      font-weight: 500;
    }
    
    /* 警告提示 */
    .warning-box {
      background: #fff7e6;
      border: 1px solid #ffd591;
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .warning-icon {
      width: 20px;
      height: 20px;
      fill: #fa8c16;
    }
    
    .warning-text {
      font-size: 13px;
      color: #d48806;
      line-height: 1.5;
    }
    
    /* 底部按钮 */
    .dialog-footer {
      padding: 16px 24px;
      background: #fafafa;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    
    .btn-cancel {
      padding: 10px 24px;
      font-size: 14px;
      color: #595959;
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-cancel:hover {
      color: #1890ff;
      border-color: #1890ff;
    }
    
    .btn-confirm {
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      background: linear-gradient(135deg, #1890ff 0%, #096dd9 100%);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(24, 144, 255, 0.3);
    }
    
    .btn-confirm:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(24, 144, 255, 0.4);
    }
    
    /* 动画 */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from { 
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="dialog-overlay">
    <div class="dialog-box">
      <!-- 头部 -->
      <div class="dialog-header">
        <div class="dialog-icon">
          <svg viewBox="0 0 24 24">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>
        <div class="dialog-title">确认批量升级</div>
      </div>
      
      <!-- 内容 -->
      <div class="dialog-body">
        <p class="dialog-desc">即将对选中的设备执行升级操作，升级过程中设备将暂时不可用。</p>
        
        <div class="count-card">
          <div class="count-number">3</div>
          <div class="count-label">台机器待升级</div>
        </div>
        
        <div class="warning-box">
          <svg class="warning-icon" viewBox="0 0 24 24">
            <path d="M12 2L1 21h22L12 2zm0 3.99L19.53 19H4.47L12 5.99zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/>
          </svg>
          <span class="warning-text">升级期间机器将暂停服务，请确保不影响正在进行的任务</span>
        </div>
      </div>
      
      <!-- 底部 -->
      <div class="dialog-footer">
        <button class="btn-cancel">取消</button>
        <button class="btn-confirm">确认升级</button>
      </div>
    </div>
  </div>
</body>
</html>
